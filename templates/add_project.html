{% extends "base.html" %}

{% block title %}{{ 'Edit' if project else 'Add' }} Project - Finance Audit System{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="fas fa-{{ 'edit' if project else 'plus' }}"></i> {{ 'Edit' if project else 'Add New' }} Project</h1>
    <a href="{{ url_for('main.projects') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Back to Projects
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="project_name" class="form-label">Project Name *</label>
                    <input type="text" class="form-control" id="project_name" name="project_name" value="{{ project.project_name if project else '' }}" required>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label for="project_code" class="form-label">Project Code *</label>
                    <input type="text" class="form-control" id="project_code" name="project_code" value="{{ project.project_code if project else '' }}" {% if project %}readonly{% endif %} required>
                </div>
                
                <div class="col-12 mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="3">{{ project.description if project else '' }}</textarea>
                </div>
                
                <div class="col-md-3 mb-3">
                    <label for="budget_amount" class="form-label">Budget Amount *</label>
                    <input type="number" step="0.01" class="form-control" id="budget_amount" name="budget_amount" value="{{ project.budget_amount if project else '' }}" required>
                </div>
                
                <div class="col-md-3 mb-3">
                    <label for="actual_amount" class="form-label">Actual Amount</label>
                    <input type="number" step="0.01" class="form-control" id="actual_amount" name="actual_amount" value="{{ project.actual_amount if project else '0' }}">
                </div>
                
                <div class="col-md-3 mb-3">
                    <label for="start_date" class="form-label">Start Date *</label>
                    <input type="date" class="form-control" id="start_date" name="start_date" value="{{ project.start_date if project else '' }}" required>
                </div>
                
                <div class="col-md-3 mb-3">
                    <label for="end_date" class="form-label">End Date</label>
                    <input type="date" class="form-control" id="end_date" name="end_date" value="{{ project.end_date if project else '' }}">
                </div>
                
                <div class="col-md-4 mb-3">
                    <label for="status" class="form-label">Status</label>
                    <select class="form-select" id="status" name="status">
                        <option value="active" {% if project and project.status == 'active' %}selected{% endif %}>Active</option>
                        <option value="on_hold" {% if project and project.status == 'on_hold' %}selected{% endif %}>On Hold</option>
                        <option value="completed" {% if project and project.status == 'completed' %}selected{% endif %}>Completed</option>
                        <option value="cancelled" {% if project and project.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
                    </select>
                </div>
                
                <div class="col-md-4 mb-3">
                    <label for="risk_level" class="form-label">Risk Level</label>
                    <select class="form-select" id="risk_level" name="risk_level">
                        <option value="low" {% if project and project.risk_level == 'low' %}selected{% endif %}>Low</option>
                        <option value="medium" {% if project and project.risk_level == 'medium' %}selected{% endif %}>Medium</option>
                        <option value="high" {% if project and project.risk_level == 'high' %}selected{% endif %}>High</option>
                        <option value="critical" {% if project and project.risk_level == 'critical' %}selected{% endif %}>Critical</option>
                    </select>
                </div>
                
                <div class="col-md-4 mb-3">
                    <label for="department" class="form-label">Department</label>
                    <input type="text" class="form-control" id="department" name="department" value="{{ project.department if project else '' }}">
                </div>
            </div>
            
            <div class="text-end">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> {{ 'Update' if project else 'Create' }} Project
                </button>
                <a href="{{ url_for('main.projects') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
