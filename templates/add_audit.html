{% extends "base.html" %}

{% block title %}Add Audit - Finance Audit System{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="fas fa-plus"></i> Schedule New Audit</h1>
    <a href="{{ url_for('main.audits') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Back to Audits
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="audit_name" class="form-label">Audit Name *</label>
                    <input type="text" class="form-control" id="audit_name" name="audit_name" required>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label for="project_id" class="form-label">Select Project *</label>
                    <select class="form-select" id="project_id" name="project_id" required>
                        <option value="">Choose a project...</option>
                        {% for project in projects %}
                        <option value="{{ project.id }}" {% if request.args.get('project_id')|int == project.id %}selected{% endif %}>
                            {{ project.project_code }} - {{ project.project_name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label for="audit_type" class="form-label">Audit Type *</label>
                    <select class="form-select" id="audit_type" name="audit_type" required>
                        <option value="internal">Internal Audit</option>
                        <option value="external">External Audit</option>
                        <option value="compliance">Compliance Audit</option>
                        <option value="financial">Financial Audit</option>
                    </select>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label for="audit_date" class="form-label">Audit Date *</label>
                    <input type="date" class="form-control" id="audit_date" name="audit_date" required>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label for="status" class="form-label">Status</label>
                    <select class="form-select" id="status" name="status">
                        <option value="pending">Pending</option>
                        <option value="in_progress">In Progress</option>
                        <option value="completed">Completed</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>
                
                <div class="col-md-3 mb-3">
                    <label for="risk_score" class="form-label">Risk Score (0-100)</label>
                    <input type="number" step="0.1" class="form-control" id="risk_score" name="risk_score" value="0">
                </div>
                
                <div class="col-md-3 mb-3">
                    <label for="compliance_score" class="form-label">Compliance Score (0-100)</label>
                    <input type="number" step="0.1" class="form-control" id="compliance_score" name="compliance_score" value="0">
                </div>
                
                <div class="col-12 mb-3">
                    <label for="findings" class="form-label">Findings</label>
                    <textarea class="form-control" id="findings" name="findings" rows="4" placeholder="List any findings from the audit..."></textarea>
                </div>
                
                <div class="col-12 mb-3">
                    <label for="recommendations" class="form-label">Recommendations</label>
                    <textarea class="form-control" id="recommendations" name="recommendations" rows="4" placeholder="Provide recommendations for improvement..."></textarea>
                </div>
            </div>
            
            <div class="text-end">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Schedule Audit
                </button>
                <a href="{{ url_for('main.audits') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
